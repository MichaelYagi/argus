{% extends "base.html" %}
{% block title %}Review — Argus{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Review queue</h1>
  <span class="muted" style="font-size:13px">Faces awaiting review</span>
</div>

<div class="review-cols">
  <!-- Suggested matches: faces Argus tentatively matched to someone. -->
  <section class="review-col">
    <h2 style="font-size:15px;margin-bottom:8px">Suggested matches</h2>
    <div class="review-bulk" style="border-left-color:var(--success)">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="sg-select-all" onchange="sgSelectAll(this)"> Select all
      </label>
      <span class="muted" style="font-size:13px"><span id="sg-count">0</span> selected</span>
      <button id="sg-confirm-btn" class="btn btn-success" onclick="sgConfirm()" disabled>Confirm selected</button>
    </div>
    <div id="suggested-list"></div>
  </section>

  <!-- No match: faces with no above-threshold match (pick a name or dismiss). -->
  <section class="review-col">
    <h2 style="font-size:15px;margin-bottom:8px">No match</h2>
    <div class="review-bulk" style="border-left-color:var(--danger)">
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="nm-select-all" onchange="nmSelectAll(this)"> Select all
      </label>
      <span class="muted" style="font-size:13px"><span id="nm-count">0</span> selected</span>
      <button id="nm-dismiss-btn" class="btn btn-danger" onclick="nmDismiss()" disabled>Dismiss selected</button>
    </div>
    <div id="nomatch-list"></div>
  </section>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/review.js"></script>
{% endblock %}
