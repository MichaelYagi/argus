{% extends "base.html" %}
{% block title %}Images — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:12px">
  <h1>Images processed</h1>
  <span class="nav-spacer"></span>
  <a href="/" class="btn btn-ghost">Dashboard</a>
</div>

<!-- Filter bar -->
<div id="filter-bar" style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;
     margin-bottom:16px;padding:12px 16px;background:var(--surface);
     border-radius:var(--radius);box-shadow:var(--shadow)">
  <div style="position:relative;flex:1;min-width:160px">
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">Identity</label>
    <input type="text" id="filter-identity" placeholder="Any identity…" autocomplete="off"
           style="width:100%;box-sizing:border-box;padding:6px 10px;font-size:13px;
                  border:1px solid var(--border);border-radius:var(--radius)">
    <input type="hidden" id="filter-identity-id">
    <div id="filter-identity-drop" style="display:none;position:absolute;left:0;right:0;
         background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
         z-index:50;max-height:180px;overflow-y:auto;
         box-shadow:0 4px 12px rgba(0,0,0,.15)"></div>
  </div>
  <div style="min-width:120px">
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">Type</label>
    <select id="filter-type" style="padding:6px 10px;font-size:13px;
            border:1px solid var(--border);border-radius:var(--radius);
            background:var(--surface);color:var(--text);width:100%">
      <option value="">All types</option>
      <option value="face">Faces</option>
      <option value="object">Objects</option>
    </select>
  </div>
  <div>
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">From</label>
    <input type="date" id="filter-since" style="padding:6px 10px;font-size:13px;
           border:1px solid var(--border);border-radius:var(--radius);
           background:var(--surface);color:var(--text)">
  </div>
  <div>
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">To</label>
    <input type="date" id="filter-until" style="padding:6px 10px;font-size:13px;
           border:1px solid var(--border);border-radius:var(--radius);
           background:var(--surface);color:var(--text)">
  </div>
  <div style="display:flex;gap:6px;align-items:flex-end">
    <button id="filter-apply" class="btn btn-primary" style="padding:6px 14px;font-size:13px">Apply</button>
    <button id="filter-clear" class="btn btn-ghost" style="padding:6px 14px;font-size:13px">Clear</button>
  </div>
</div>

<p class="muted" id="img-empty" hidden style="margin-top:24px">
  No images processed yet. Run <a href="/detect">detection</a> on some photos first.
</p>

<div id="gallery"></div>
<p class="muted loading" id="img-loading">Loading…</p>

<button id="scroll-top" class="scroll-top-btn" aria-label="Back to top" title="Back to top">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
       stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 19V5M5 12l7-7 7 7"/>
  </svg>
</button>
{% endblock %}

{% block scripts %}
<script>
(() => {
  // Reloads (and other normal navigations) must land at the top — we restore the
  // scroll position ourselves only when returning from a tag page (see RESTORE_KEY,
  // set on photo click). Turning off the browser's automatic per-entry scroll
  // restoration stops a plain reload from jumping back down.
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';

  // Justified layout, same math as gallery.js packRows, but laid out INCREMENTALLY.
  // Completed full-width rows are appended once and never rebuilt, so loading a new
  // page never re-renders existing rows (that full rebuild was the scroll jank/jump).
  // Only the trailing partial row is re-flowed as more items arrive. A full relayout
  // happens solely on resize, where every row's width changes anyway.
  const GAP = 4;
  const TARGET_H = 200;

  const container = document.getElementById('gallery');
  const emptyEl   = document.getElementById('img-empty');
  const loadingEl = document.getElementById('img-loading');

  let items = [], cursor = null, hasMore = true, loading = false, sentinelVisible = false;
  let pending = [];   // trailing items not yet forming a complete row
  let tailEl = null;  // DOM node for the temporary partial last row

  // Active filter state — on window so the filter bar IIFE can read/write them
  window.filterIdentityId = null;
  window.filterType  = '';
  window.filterSince = '';
  window.filterUntil = '';

  function buildRow(rowItems, height) {
    const rowEl = document.createElement('div');
    rowEl.className = 'g-row';
    rowItems.forEach(item => {
      const ar = item.ar || (item.width || 1) / (item.height || 1);

      const a = document.createElement('a');
      a.className = 'g-item';
      a.href = '/tag/' + item.source_image_id;
      a.style.width  = Math.floor(ar * height) + 'px';
      a.style.height = Math.floor(height) + 'px';

      const img = document.createElement('img');
      img.src = item.source_image_url;
      img.loading = 'lazy';
      img.alt = '';
      a.appendChild(img);

      if (item.detection_count) {
        const badge = document.createElement('span');
        badge.textContent = item.detection_count;
        badge.title = item.detection_count + ' detection' + (item.detection_count !== 1 ? 's' : '');
        badge.style.cssText = 'position:absolute;bottom:6px;right:6px;z-index:2;' +
          'background:rgba(0,0,0,.6);color:#fff;border-radius:99px;padding:1px 7px;' +
          'font-size:11px;font-weight:600;line-height:16px';
        a.appendChild(badge);
      }
      rowEl.appendChild(a);
    });
    return rowEl;
  }

  // Append complete full-width rows from `work`; return the leftover items that
  // don't yet fill a row.
  function flushRows(work) {
    const W = container.clientWidth;
    let cur = [], sumAR = 0;
    work.forEach(raw => {
      const item = { ...raw, ar: (raw.width || 1) / (raw.height || 1) };
      cur.push(item);
      sumAR += item.ar;
      if (sumAR * TARGET_H + GAP * (cur.length - 1) >= W) {
        container.appendChild(buildRow(cur, (W - GAP * (cur.length - 1)) / sumAR));
        cur = []; sumAR = 0;
      }
    });
    return cur;
  }

  function appendItems(newItems) {
    if (tailEl) { tailEl.remove(); tailEl = null; }
    pending = flushRows(pending.concat(newItems));
    if (pending.length) {
      tailEl = buildRow(pending, TARGET_H);
      container.appendChild(tailEl);
    }
  }

  function relayout() {
    container.innerHTML = '';
    pending = []; tailEl = null;
    appendItems(items);
  }

  async function loadPage() {
    if (loading || !hasMore) return;
    loading = true;

    const params = new URLSearchParams({ limit: 40 });
    if (cursor)                      params.set('cursor', cursor);
    if (window.filterIdentityId)     params.set('identity_id', window.filterIdentityId);
    if (window.filterType)           params.set('type', window.filterType);
    if (window.filterSince)          params.set('since', window.filterSince + 'T00:00:00');
    if (window.filterUntil)          params.set('until', window.filterUntil + 'T23:59:59');
    const resp = await fetch('/api/source-images?' + params);
    if (!resp.ok) { loading = false; return; }
    const data = await resp.json();

    hasMore = data.has_more;
    cursor  = data.next_cursor;

    if (!items.length && !data.items.length) {
      if (emptyEl) emptyEl.hidden = false;
      if (loadingEl) loadingEl.hidden = true;
      loading = false;
      return;
    }

    items.push(...data.items);
    appendItems(data.items);

    loading = false;
    if (loadingEl) loadingEl.hidden = true;
    if (!hasMore) sentinel.remove();
    else if (sentinelVisible) loadPage();
  }

  window.resetGallery = function resetGallery() {
    cursor = null; hasMore = true; loading = false;
    items = []; pending = [];
    if (tailEl) { tailEl.remove(); tailEl = null; }
    container.innerHTML = '';
    if (loadingEl) loadingEl.hidden = false;
    if (emptyEl)   emptyEl.hidden = true;
    // Re-attach sentinel if a previous load had exhausted all items and removed it.
    if (!sentinel.parentNode) container.after(sentinel);
    loadPage();
  };

  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  container.after(sentinel);

  function observe() {
    new IntersectionObserver(([e]) => {
      sentinelVisible = e.isIntersecting;
      if (e.isIntersecting) loadPage();
    }, { rootMargin: '300px' }).observe(sentinel);
  }

  // Scroll restoration (bfcache-independent). Clicking a photo records the scroll
  // position and how many rows were loaded; on return we reload that many and
  // scroll back. Row heights come from stored dimensions, so layout height is
  // correct immediately and the scroll lands accurately before images decode.
  const RESTORE_KEY = 'argus-images-scroll';

  container.addEventListener('click', e => {
    const a = e.target.closest('a.g-item');
    if (!a || e.button !== 0 || e.ctrlKey || e.metaKey || e.shiftKey) return;
    try {
      sessionStorage.setItem(RESTORE_KEY, JSON.stringify({ y: window.scrollY, count: items.length }));
    } catch (_) {}
  });

  // If the browser restores from bfcache, reset and re-fetch so deleted/changed
  // images don't linger. Also clear the scroll key so the restore logic doesn't
  // try to jump to a stale position.
  window.addEventListener('pageshow', e => {
    if (!e.persisted) return;
    try { sessionStorage.removeItem(RESTORE_KEY); } catch (_) {}
    window.resetGallery();
  });

  async function init() {
    let saved = null;
    try { saved = JSON.parse(sessionStorage.getItem(RESTORE_KEY) || 'null'); } catch (_) {}
    if (saved && saved.count > 0) {
      try { sessionStorage.removeItem(RESTORE_KEY); } catch (_) {}
      // Observer attached only after restore so it can't race the catch-up loads.
      while (items.length < saved.count && hasMore) await loadPage();
      window.scrollTo(0, saved.y);
    } else {
      await loadPage();
    }
    observe();
  }
  init();

  let resizeT;
  window.addEventListener('resize', () => {
    if (!items.length) return;
    clearTimeout(resizeT);
    resizeT = setTimeout(relayout, 150);
  });

  // Back-to-top button — appears once scrolled away from the top.
  const toTop = document.getElementById('scroll-top');
  const updateToTop = () => { toTop.style.display = window.scrollY > 300 ? 'flex' : 'none'; };
  window.addEventListener('scroll', updateToTop, { passive: true });
  toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  updateToTop();  // reflect initial position (e.g. after scroll restore)
})();

// Filter bar
(function() {
  const identityInput = document.getElementById('filter-identity');
  const identityIdEl  = document.getElementById('filter-identity-id');
  const identityDrop  = document.getElementById('filter-identity-drop');
  const typeEl        = document.getElementById('filter-type');
  const sinceEl       = document.getElementById('filter-since');
  const untilEl       = document.getElementById('filter-until');

  // Identity search-as-you-type
  let searchTimer;
  identityInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    identityIdEl.value = '';
    const q = identityInput.value.trim();
    if (!q) { identityDrop.style.display = 'none'; return; }
    searchTimer = setTimeout(async () => {
      const params = new URLSearchParams({ q, limit: 10 });
      const resp = await fetch('/api/identities?' + params);
      if (!resp.ok) return;
      const data = await resp.json();
      const rows = Array.isArray(data) ? data : (data.items || []);
      identityDrop.innerHTML = '';
      if (!rows.length) { identityDrop.style.display = 'none'; return; }
      rows.forEach(i => {
        const item = document.createElement('div');
        item.textContent = i.label + (i.type === 'object' ? ' (object)' : '');
        item.style.cssText = 'padding:7px 12px;cursor:pointer;font-size:13px';
        item.addEventListener('mouseenter', () => { item.style.background = 'var(--hover,#f0f0f0)'; });
        item.addEventListener('mouseleave', () => { item.style.background = ''; });
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          identityInput.value = i.label;
          identityIdEl.value  = i.id;
          identityDrop.style.display = 'none';
        });
        identityDrop.appendChild(item);
      });
      identityDrop.style.display = 'block';
    }, 200);
  });
  identityInput.addEventListener('blur', () => {
    setTimeout(() => { identityDrop.style.display = 'none'; }, 200);
  });
  identityInput.addEventListener('focus', () => {
    if (identityInput.value.trim()) identityInput.dispatchEvent(new Event('input'));
  });

  // Allow clearing the typed text to also clear the hidden id
  identityInput.addEventListener('change', () => {
    if (!identityInput.value.trim()) identityIdEl.value = '';
  });

  document.getElementById('filter-apply').addEventListener('click', () => {
    // Typed text without a dropdown selection is ignored — identity_id is required.
    window.filterIdentityId = identityIdEl.value ? parseInt(identityIdEl.value) : null;
    window.filterType  = typeEl.value;
    window.filterSince = sinceEl.value;
    window.filterUntil = untilEl.value;
    window.resetGallery();
  });

  document.getElementById('filter-clear').addEventListener('click', () => {
    identityInput.value = ''; identityIdEl.value = '';
    typeEl.value = ''; sinceEl.value = ''; untilEl.value = '';
    window.filterIdentityId = null;
    window.filterType = ''; window.filterSince = ''; window.filterUntil = '';
    window.resetGallery();
  });
})();
</script>
{% endblock %}
