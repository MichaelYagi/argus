{% extends "base.html" %}
{% block title %}Images — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:12px">
  <h1>Images processed</h1>
  <span class="nav-spacer"></span>
  <a href="/" class="btn btn-ghost">Dashboard</a>
</div>

<!-- Filter bar -->
<div id="filter-bar" style="display:flex;flex-wrap:wrap;gap:8px;align-items:flex-start;
     margin-bottom:16px;padding:12px 16px;background:var(--surface);
     border-radius:var(--radius);box-shadow:var(--shadow)">
  <div style="position:relative;flex:1;min-width:200px">
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">Identity</label>
    <div id="filter-identity-wrap"
         style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;
                padding:4px 8px;min-height:34px;box-sizing:border-box;
                border:1px solid var(--border);border-radius:var(--radius);
                background:var(--surface);cursor:text">
      <input type="text" id="filter-identity" placeholder="Search people, objects…" autocomplete="off"
             style="flex:1;min-width:80px;border:none;outline:none;background:transparent;
                    font-size:13px;padding:2px 0;color:var(--text)">
      <span id="filter-count" style="margin-left:auto;font-size:12px;color:var(--muted);
            white-space:nowrap;padding:2px 2px 2px 6px;align-self:center"></span>
    </div>
    <div id="filter-identity-drop" style="display:none;position:absolute;left:0;right:0;
         background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
         z-index:50;max-height:180px;overflow-y:auto;
         box-shadow:0 4px 12px rgba(0,0,0,.15)"></div>
  </div>
  <div style="min-width:150px">
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">Sort</label>
    <select id="filter-sort" style="padding:6px 10px;font-size:13px;
            border:1px solid var(--border);border-radius:var(--radius);
            background:var(--surface);color:var(--text);width:100%">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="most_detections">Most detections</option>
      <option value="fewest_detections">Fewest detections</option>
    </select>
  </div>
  <div style="min-width:150px">
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">Filter</label>
    <select id="filter-type" style="padding:6px 10px;font-size:13px;
            border:1px solid var(--border);border-radius:var(--radius);
            background:var(--surface);color:var(--text);width:100%">
      <option value="">Unfiltered</option>
      <option value="face">Faces only</option>
      <option value="object">Objects only</option>
      <option value="no_tagged_faces">No tagged faces</option>
      <option value="no_crops">No crops</option>
    </select>
  </div>
  <div>
    <label class="lbl" style="display:block;margin-bottom:4px;font-size:12px">Date range</label>
    <div style="display:flex;gap:6px">
      <input type="date" id="filter-since" style="padding:6px 10px;font-size:13px;
             border:1px solid var(--border);border-radius:var(--radius);
             background:var(--surface);color:var(--text)">
      <input type="date" id="filter-until" style="padding:6px 10px;font-size:13px;
             border:1px solid var(--border);border-radius:var(--radius);
             background:var(--surface);color:var(--text)">
    </div>
    <div style="display:flex;gap:4px;margin-top:5px">
      <button id="preset-today" class="btn btn-ghost" style="padding:3px 8px;font-size:11px">Today</button>
      <button id="preset-week"  class="btn btn-ghost" style="padding:3px 8px;font-size:11px">This week</button>
      <button id="preset-month" class="btn btn-ghost" style="padding:3px 8px;font-size:11px">This month</button>
    </div>
  </div>
  <div style="display:flex;gap:6px;margin-top:22px">
    <button id="filter-apply" class="btn btn-primary" style="padding:6px 14px;font-size:13px">Apply</button>
    <button id="filter-clear" class="btn btn-ghost" style="padding:6px 14px;font-size:13px">Clear</button>
  </div>
</div>

<div id="batch-bar" style="display:none;align-items:center;gap:8px;flex-wrap:wrap;
     padding:8px 14px;margin-bottom:10px;background:var(--surface);
     border-radius:var(--radius);box-shadow:var(--shadow)">
  <span id="batch-count" style="font-size:13px;font-weight:500"></span>
  <span class="nav-spacer"></span>
  <button class="btn btn-danger" style="font-size:12px;padding:4px 12px"
          onclick="deleteSelected()">Delete Selected</button>
  <button class="btn btn-ghost" style="font-size:12px;padding:4px 12px"
          onclick="clearSelection()">Clear</button>
</div>

<div id="gallery-actions" style="display:flex;align-items:center;justify-content:flex-end;
     margin-bottom:8px;min-height:26px">
  <button id="select-all-btn" class="btn btn-ghost"
          style="font-size:12px;padding:3px 10px"
          onclick="selectDeselectAll()">Select all</button>
</div>

<p class="muted" id="img-empty" hidden style="margin-top:24px">
  No images processed yet. Run <a href="/detect">detection</a> on some photos first.
</p>

<div id="gallery"></div>
<p class="muted loading" id="img-loading">Loading…</p>

<button id="scroll-top" class="scroll-top-btn" aria-label="Back to top" title="Back to top">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
       stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 19V5M5 12l7-7 7 7"/>
  </svg>
</button>
{% endblock %}

{% block scripts %}
<script>
// Convert a date-picker value ("YYYY-MM-DD") to a UTC ISO datetime string that
// represents midnight (endOfDay=false) or 23:59:59 (endOfDay=true) in USER_TZ.
function localDateToUTC(dateStr, endOfDay) {
  const tz = window.USER_TZ || 'UTC';
  const timeStr = endOfDay ? 'T23:59:59' : 'T00:00:00';
  // Treat the naive local time as UTC to get a reference Date object.
  const naive = new Date(dateStr + timeStr + 'Z');
  // Find what local time that UTC instant maps to in the user's tz.
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
  }).formatToParts(naive);
  const p = {};
  for (const { type, value } of parts) if (type !== 'literal') p[type] = +value;
  // Offset = naive - (local parts treated as UTC) → add it back to get true UTC.
  const localAsUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute, p.second);
  return new Date(naive.getTime() + (naive.getTime() - localAsUTC)).toISOString().slice(0, 19);
}

// Gallery
(() => {
  // Init filter state from URL params so the first gallery load uses them.
  // Chips are rendered by the Filter bar IIFE (runs immediately after this one).
  (function() {
    const p = new URLSearchParams(location.search);
    const ids    = p.getAll('identity_id').map(Number).filter(Boolean);
    const labels = p.getAll('identity_label');
    window.filterIdentityIds = ids.map((id, i) => ({ id, label: labels[i] || String(id) }));
    window.filterType  = p.get('type') || '';
    window.filterSince = p.get('since') || '';
    window.filterUntil = p.get('until') || '';
    window.filterSort  = p.get('sort') || 'newest';
    const tEl = document.getElementById('filter-type');
    if (tEl) tEl.value = window.filterType;
    const sEl = document.getElementById('filter-since');
    if (sEl) sEl.value = window.filterSince;
    const uEl = document.getElementById('filter-until');
    if (uEl) uEl.value = window.filterUntil;
    const sortEl = document.getElementById('filter-sort');
    if (sortEl) sortEl.value = window.filterSort;
  })();

  const container   = document.getElementById('gallery');
  const batchBar    = document.getElementById('batch-bar');
  const batchCount  = document.getElementById('batch-count');
  const selectAllBtn = document.getElementById('select-all-btn');
  const selected    = new Set();   // Set<source_image_id>
  const loadedItems = [];          // mirror of gallery items

  function updateSelectAllBtn() {
    if (!selectAllBtn) return;
    selectAllBtn.textContent = 'Select all';
    const actionsRow = document.getElementById('gallery-actions');
    if (actionsRow) actionsRow.style.display = selected.size > 0 ? 'none' : 'flex';
  }

  function updateBatchBar() {
    const n = selected.size;
    batchBar.style.display = n > 0 ? 'flex' : 'none';
    batchCount.textContent = n + ' selected';
    container.classList.toggle('has-selection', n > 0);
    updateSelectAllBtn();
  }

  window.clearSelection = () => {
    selected.clear();
    container.querySelectorAll('.g-item.selected').forEach(el => {
      el.classList.remove('selected');
      const cb = el.querySelector('.g-check');
      if (cb) cb.checked = false;
    });
    updateBatchBar();
  };

  window.selectDeselectAll = async () => {
    if (selectAllBtn) { selectAllBtn.disabled = true; selectAllBtn.textContent = 'Selecting…'; }
    try {
      const params = new URLSearchParams();
      (window.filterIdentityIds || []).forEach(f => params.append('identity_id', f.id));
      if (window.filterType === 'no_tagged_faces') params.set('no_tagged_faces', 'true');
      else if (window.filterType === 'no_crops')   params.set('no_crops', 'true');
      else if (window.filterType)                  params.set('type', window.filterType);
      if (window.filterSince) params.set('since', localDateToUTC(window.filterSince, false));
      if (window.filterUntil) params.set('until', localDateToUTC(window.filterUntil, true));
      const resp = await fetch('/api/source-images/ids?' + params);
      if (!resp.ok) return;
      const data = await resp.json();
      data.ids.forEach(id => selected.add(id));
      container.querySelectorAll('.g-item').forEach(el => {
        const id = parseInt(el.dataset.id, 10);
        if (selected.has(id)) {
          el.classList.add('selected');
          const cb = el.querySelector('.g-check');
          if (cb) cb.checked = true;
        }
      });
      updateBatchBar();
    } finally {
      if (selectAllBtn) selectAllBtn.disabled = false;
      updateSelectAllBtn();
    }
  };

  window.deleteSelected = () => {
    const n = selected.size;
    if (!n) return;
    showConfirm(
      `Permanently delete ${n} image${n === 1 ? '' : 's'} and all their detections, labels, and crops?\n\nThis cannot be undone.`,
      async () => {
        const ids = [...selected];
        const succeeded = [];
        await Promise.all(ids.map(async id => {
          try {
            const resp = await fetch('/api/images/' + id, { method: 'DELETE' });
            if (resp.ok) succeeded.push(id);
          } catch (_) {}
        }));
        succeeded.forEach(id => {
          const idx = loadedItems.findIndex(i => i.source_image_id === id);
          if (idx !== -1) loadedItems.splice(idx, 1);
          selected.delete(id);
        });
        gallery.removeItems(succeeded.map(id => i => i.source_image_id === id));
        updateBatchBar();
        const failed = ids.length - succeeded.length;
        if (succeeded.length && window.showToast)
          showToast(succeeded.length + ' image' + (succeeded.length === 1 ? '' : 's') + ' deleted', 'success');
        if (failed && window.showToast)
          showToast(failed + ' deletion' + (failed === 1 ? '' : 's') + ' failed', 'error');
      },
      { confirmText: 'Delete ' + n, danger: true }
    );
  };

  let gallery;

  gallery = ArgusGallery({
    container,
    emptyEl:   document.getElementById('img-empty'),
    loadingEl: document.getElementById('img-loading'),
    stateKey:  '_argus_images',

    ar: item => (item.width || 1) / (item.height || 1),

    buildItem(item, { saveState, removeItem }) {
      const a = document.createElement('a');
      a.className = 'g-item' + (selected.has(item.source_image_id) ? ' selected' : '');
      a.href = '/tag/' + item.source_image_id;
      a.dataset.id = item.source_image_id;
      a.addEventListener('click', () => {
        saveState(item.source_image_id);
        sessionStorage.setItem('argus_nav_ids', JSON.stringify(loadedItems.map(i => i.source_image_id)));
        sessionStorage.setItem('argus_nav_back', location.href);
      });

      const img = document.createElement('img');
      img.src = item.source_image_url;
      img.loading = 'lazy';
      img.alt = '';
      a.appendChild(img);

      if (item.face_count || item.object_count) {
        const wrap = document.createElement('div');
        wrap.style.cssText = 'position:absolute;bottom:6px;right:6px;z-index:2;display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end';
        if (item.face_count) {
          const b = document.createElement('span');
          b.textContent = item.face_count + (item.face_count === 1 ? ' face' : ' faces');
          b.style.cssText = 'background:#f93;color:#000;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:600;line-height:16px;white-space:nowrap';
          wrap.appendChild(b);
        }
        if (item.object_count) {
          const b = document.createElement('span');
          b.textContent = item.object_count + (item.object_count === 1 ? ' object' : ' objects');
          b.style.cssText = 'background:#39f;color:#fff;border-radius:99px;padding:1px 7px;font-size:11px;font-weight:600;line-height:16px;white-space:nowrap';
          wrap.appendChild(b);
        }
        a.appendChild(wrap);
      }

      const delBtn = document.createElement('button');
      delBtn.title = 'Delete image and all its detections';
      delBtn.style.cssText = 'position:absolute;top:5px;right:5px;z-index:3;' +
        'background:rgba(0,0,0,.65);border:none;color:#ccc;border-radius:3px;' +
        'padding:2px 6px;font-size:11px;cursor:pointer;opacity:0;' +
        'transition:opacity .15s,color .15s;line-height:1';
      delBtn.textContent = '✕';
      delBtn.addEventListener('mouseenter', () => { delBtn.style.color = '#fc8181'; });
      delBtn.addEventListener('mouseleave', () => { delBtn.style.color = '#ccc'; });
      a.addEventListener('mouseenter', () => { delBtn.style.opacity = '1'; });
      a.addEventListener('mouseleave', () => { delBtn.style.opacity = '0'; });
      delBtn.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        showConfirm(
          'Permanently delete this image and all its detections, labels, and crops?\n\nThis cannot be undone.',
          async () => {
            const resp = await fetch('/api/images/' + item.source_image_id, { method: 'DELETE' });
            if (resp.ok) {
              const idx = loadedItems.findIndex(i => i.source_image_id === item.source_image_id);
              if (idx !== -1) loadedItems.splice(idx, 1);
              selected.delete(item.source_image_id);
              updateBatchBar();
              removeItem(i => i.source_image_id === item.source_image_id);
              if (window.showToast) showToast('Image deleted', 'success');
            } else if (window.showToast) {
              showToast('Delete failed', 'error');
            }
          },
          { confirmText: 'Delete image', danger: true }
        );
      });
      a.appendChild(delBtn);

      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'g-check';
      cb.checked = selected.has(item.source_image_id);
      cb.addEventListener('click', e => {
        e.stopPropagation();
        if (cb.checked) selected.add(item.source_image_id); else selected.delete(item.source_image_id);
        a.classList.toggle('selected', cb.checked);
        updateBatchBar();
      });
      a.appendChild(cb);

      return a;
    },

    findEl: (c, id) => c.querySelector('[data-id="' + id + '"]'),

    async fetchPage(cursor) {
      const params = new URLSearchParams({ limit: 40 });
      if (cursor) params.set('cursor', cursor);
      (window.filterIdentityIds || []).forEach(f => params.append('identity_id', f.id));
      if (window.filterType === 'no_tagged_faces') params.set('no_tagged_faces', 'true');
      else if (window.filterType === 'no_crops')   params.set('no_crops', 'true');
      else if (window.filterType)                  params.set('type', window.filterType);
      if (window.filterSince) params.set('since', localDateToUTC(window.filterSince, false));
      if (window.filterUntil) params.set('until', localDateToUTC(window.filterUntil, true));
      if (window.filterSort && window.filterSort !== 'newest') params.set('sort', window.filterSort);
      const resp = await fetch('/api/source-images?' + params);
      if (!resp.ok) throw new Error('fetch failed');
      const d = await resp.json();
      loadedItems.push(...d.items);
      return { items: d.items, nextCursor: d.next_cursor, hasMore: d.has_more };
    },

    extraState: () => ({
      filterIdentityIds: window.filterIdentityIds,
      filterType:        window.filterType,
      filterSince:       window.filterSince,
      filterUntil:       window.filterUntil,
      filterSort:        window.filterSort,
      selectedIds:       [...selected],
    }),

    restoreExtra(state) {
      window.filterIdentityIds = state.filterIdentityIds || [];
      window.filterType        = state.filterType  || '';
      window.filterSince       = state.filterSince || '';
      window.filterUntil       = state.filterUntil || '';
      window.filterSort        = state.filterSort  || 'newest';
      if (window.renderChips) window.renderChips();
      const tEl = document.getElementById('filter-type');
      if (tEl) tEl.value = window.filterType;
      const sEl = document.getElementById('filter-since');
      if (sEl) sEl.value = window.filterSince;
      const uEl = document.getElementById('filter-until');
      if (uEl) uEl.value = window.filterUntil;
      const sortEl = document.getElementById('filter-sort');
      if (sortEl) sortEl.value = window.filterSort;
      loadedItems.length = 0;
      loadedItems.push(...(state.items || []));
      selected.clear();
      (state.selectedIds || []).forEach(id => selected.add(id));
      updateBatchBar();
      if (window.fetchFilterCount) window.fetchFilterCount();
    },
  });

  window.resetGallery = () => {
    loadedItems.length = 0;
    selected.clear();
    updateBatchBar();
    gallery.reset();
  };

  const toTop = document.getElementById('scroll-top');
  const updateToTop = () => { toTop.style.display = window.scrollY > 300 ? 'flex' : 'none'; };
  window.addEventListener('scroll', updateToTop, { passive: true });
  toTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  updateToTop();
})();

// Filter bar
(function() {
  const wrap          = document.getElementById('filter-identity-wrap');
  const identityInput = document.getElementById('filter-identity');
  const identityDrop  = document.getElementById('filter-identity-drop');
  const typeEl        = document.getElementById('filter-type');
  const sinceEl       = document.getElementById('filter-since');
  const untilEl       = document.getElementById('filter-until');
  const sortEl        = document.getElementById('filter-sort');
  const CHIP_MAX      = 5;

  function _esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderChips() {
    wrap.querySelectorAll('.fi-chip').forEach(c => c.remove());
    (window.filterIdentityIds || []).forEach(f => {
      const chip = document.createElement('span');
      chip.className = 'fi-chip';
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:3px;padding:2px 4px 2px 8px;' +
        'background:rgba(59,130,246,.15);color:#3b82f6;border-radius:99px;' +
        'font-size:12px;font-weight:500;white-space:nowrap;flex-shrink:0';
      const lbl = document.createElement('span');
      lbl.textContent = f.label;
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.innerHTML = '&times;';
      btn.title = 'Remove';
      btn.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;' +
        'width:16px;height:16px;border:none;background:none;cursor:pointer;' +
        'color:inherit;padding:0;border-radius:50%;font-size:14px;line-height:1;opacity:.7';
      btn.addEventListener('mouseenter', () => { btn.style.opacity = '1'; });
      btn.addEventListener('mouseleave', () => { btn.style.opacity = '.7'; });
      btn.addEventListener('click', e => {
        e.stopPropagation();
        window.filterIdentityIds = window.filterIdentityIds.filter(x => x.id !== f.id);
        renderChips();
      });
      chip.appendChild(lbl);
      chip.appendChild(btn);
      wrap.insertBefore(chip, identityInput);
    });
    const atCap = (window.filterIdentityIds || []).length >= CHIP_MAX;
    identityInput.placeholder = atCap ? '' : 'Search people, objects…';
    identityInput.style.display = atCap ? 'none' : '';
  }
  window.renderChips = renderChips;

  // Async count of images matching current filters — fires fire-and-forget.
  async function fetchFilterCount() {
    const countEl = document.getElementById('filter-count');
    if (!countEl) return;
    countEl.textContent = '';
    const params = new URLSearchParams();
    (window.filterIdentityIds || []).forEach(f => params.append('identity_id', f.id));
    if (window.filterType === 'no_tagged_faces') params.set('no_tagged_faces', 'true');
    else if (window.filterType === 'no_crops')   params.set('no_crops', 'true');
    else if (window.filterType)                  params.set('type', window.filterType);
    if (window.filterSince) params.set('since', localDateToUTC(window.filterSince, false));
    if (window.filterUntil) params.set('until', localDateToUTC(window.filterUntil, true));
    try {
      const resp = await fetch('/api/source-images/count?' + params);
      if (!resp.ok) return;
      const { count } = await resp.json();
      countEl.textContent = count > 0 ? count.toLocaleString() : '';
    } catch (_) {}
  }
  window.fetchFilterCount = fetchFilterCount;

  // Date presets — set from/to and apply immediately.
  (function() {
    function isoLocal(d) { return d.toLocaleDateString('en-CA'); }
    function setAndApply(since, until) {
      sinceEl.value = since; untilEl.value = until;
      document.getElementById('filter-apply').click();
    }
    document.getElementById('preset-today').addEventListener('click', () => {
      const t = isoLocal(new Date());
      setAndApply(t, t);
    });
    document.getElementById('preset-week').addEventListener('click', () => {
      const now = new Date();
      const mon = new Date(now);
      mon.setDate(now.getDate() - ((now.getDay() + 6) % 7));
      setAndApply(isoLocal(mon), isoLocal(now));
    });
    document.getElementById('preset-month').addEventListener('click', () => {
      const now = new Date();
      setAndApply(isoLocal(new Date(now.getFullYear(), now.getMonth(), 1)), isoLocal(now));
    });
  })();

  // / shortcut — focus identity input unless already in a field.
  document.addEventListener('keydown', e => {
    if (e.key !== '/') return;
    const tag = document.activeElement?.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    e.preventDefault();
    identityInput.focus();
  });

  // Render chips and fire initial count for any filters already set from URL.
  renderChips();
  fetchFilterCount();

  // Click on the wrap focuses the input.
  wrap.addEventListener('click', () => { if (identityInput.style.display !== 'none') identityInput.focus(); });

  let searchTimer;
  identityInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = identityInput.value.trim();
    if (!q) { identityDrop.style.display = 'none'; return; }
    searchTimer = setTimeout(async () => {
      const params = new URLSearchParams({ q, limit: 10 });
      const resp = await fetch('/api/search?' + params);
      if (!resp.ok) return;
      const data = await resp.json();
      const rows = (data.items || []).filter(
        i => !(window.filterIdentityIds || []).some(f => f.id === i.id)
      );
      identityDrop.innerHTML = '';
      if (!rows.length) { identityDrop.style.display = 'none'; return; }
      rows.forEach(i => {
        const item = document.createElement('div');
        item.className = 'ns-item';
        item.style.cursor = 'pointer';
        const thumb = i.cover_url
          ? '<img src="' + _esc(i.cover_url) + '" class="ns-thumb" alt="">'
          : '<span class="ns-thumb ns-ph">' + _esc((i.label || '?')[0]) + '</span>';
        const badge = '<span class="ns-badge ns-badge-' + i.type + '">' + i.type + '</span>';
        const cnt   = i.detection_count ? '<span class="ns-count">' + i.detection_count + '</span>' : '';
        item.innerHTML = thumb + '<span class="ns-label">' + _esc(i.label) + '</span>' + badge + cnt;
        item.addEventListener('mousedown', e => {
          e.preventDefault();
          if ((window.filterIdentityIds || []).length >= CHIP_MAX) return;
          window.filterIdentityIds = [...(window.filterIdentityIds || []), { id: i.id, label: i.label }];
          renderChips();
          identityInput.value = '';
          identityDrop.style.display = 'none';
          identityInput.focus();
        });
        identityDrop.appendChild(item);
      });
      identityDrop.style.display = 'block';
    }, 200);
  });

  identityInput.addEventListener('blur', () => {
    setTimeout(() => { identityDrop.style.display = 'none'; }, 200);
  });

  identityInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const first = identityDrop.querySelector('.ns-item');
      if (first && identityDrop.style.display !== 'none') {
        first.dispatchEvent(new MouseEvent('mousedown', { bubbles: true }));
      } else if (!identityInput.value.trim()) {
        document.getElementById('filter-apply').click();
      }
    } else if (e.key === 'Backspace' && !identityInput.value) {
      const ids = window.filterIdentityIds || [];
      if (ids.length) {
        window.filterIdentityIds = ids.slice(0, -1);
        renderChips();
      }
    }
  });

  function buildUrlParams() {
    const p = new URLSearchParams();
    (window.filterIdentityIds || []).forEach(f => {
      p.append('identity_id', f.id);
      p.append('identity_label', f.label);
    });
    if (window.filterType)  p.set('type', window.filterType);
    if (window.filterSince) p.set('since', window.filterSince);
    if (window.filterUntil) p.set('until', window.filterUntil);
    if (window.filterSort && window.filterSort !== 'newest') p.set('sort', window.filterSort);
    return p;
  }

  function readUrlIntoState() {
    const p = new URLSearchParams(location.search);
    const ids    = p.getAll('identity_id').map(Number).filter(Boolean);
    const labels = p.getAll('identity_label');
    window.filterIdentityIds = ids.map((id, i) => ({ id, label: labels[i] || String(id) }));
    window.filterType  = p.get('type')  || '';
    window.filterSince = p.get('since') || '';
    window.filterUntil = p.get('until') || '';
    window.filterSort  = p.get('sort')  || 'newest';
    renderChips();
    typeEl.value  = window.filterType;
    sinceEl.value = window.filterSince;
    untilEl.value = window.filterUntil;
    if (sortEl) sortEl.value = window.filterSort;
  }

  document.getElementById('filter-apply').addEventListener('click', () => {
    identityDrop.style.display = 'none';
    window.filterType  = typeEl.value;
    window.filterSince = sinceEl.value;
    window.filterUntil = untilEl.value;
    window.filterSort  = sortEl ? sortEl.value : 'newest';
    const qs = buildUrlParams().toString();
    history.pushState(null, '', qs ? '?' + qs : location.pathname);
    fetchFilterCount();
    window.resetGallery();
  });

  document.getElementById('filter-clear').addEventListener('click', () => {
    window.filterIdentityIds = [];
    window.filterType = ''; window.filterSince = ''; window.filterUntil = '';
    window.filterSort = 'newest';
    renderChips();
    typeEl.value = ''; sinceEl.value = ''; untilEl.value = '';
    if (sortEl) sortEl.value = 'newest';
    history.pushState(null, '', location.pathname);
    fetchFilterCount();
    window.resetGallery();
  });

  window.addEventListener('popstate', () => {
    readUrlIntoState();
    fetchFilterCount();
    window.resetGallery();
  });
})();
</script>
{% endblock %}
