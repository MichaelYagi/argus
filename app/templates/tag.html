{% extends "base.html" %}
{% block title %}Tag image — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:12px">
  <a id="back-link" href="/">&larr; Back</a>
  <span class="muted" style="font-size:13px;margin-left:8px">
    Click a box to assign or correct a label. Faces: orange = unlabeled, green = labeled. Objects: blue.
  </span>
  <span class="nav-spacer"></span>
  <span id="tag-status" class="muted" style="font-size:12px"></span>
  <button class="btn btn-ghost" id="reprocess-btn" style="margin-left:8px">Reprocess</button>
</div>

<!-- Reprocess modal -->
<div id="reprocess-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
     z-index:500;align-items:center;justify-content:center">
  <div style="background:var(--surface);border-radius:10px;padding:24px;
              min-width:300px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.4)">
    <h2 style="margin-bottom:16px;font-size:16px">Reprocess image</h2>
    <div class="form-group" style="margin-bottom:12px">
      <label class="lbl">Detection type</label>
      <select id="reprocess-type" style="width:100%;padding:7px 10px;
              border:1px solid var(--border);border-radius:var(--radius);
              background:var(--surface);color:var(--text);font-size:13px">
        <option value="all">All (faces + objects)</option>
        <option value="faces">Faces only</option>
        <option value="objects">Objects only</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px">
      <input type="checkbox" id="reprocess-replace" style="cursor:pointer">
      <label for="reprocess-replace" style="font-size:13px;cursor:pointer">
        Replace existing detections (clears prior results for this type)
      </label>
    </div>
    <div style="display:flex;gap:8px">
      <button id="reprocess-save-btn" class="btn btn-primary">Run</button>
      <button class="btn btn-ghost"
              onclick="document.getElementById('reprocess-overlay').style.display='none'">Cancel</button>
    </div>
    <p id="reprocess-error" style="color:#e53e3e;font-size:12px;margin-top:8px;display:none"></p>
  </div>
</div>

<div id="tag-wrap">
  <img id="tag-photo" src="{{ image_url }}" alt="" onload="renderBoxes()">
</div>
{% endblock %}

{% block scripts %}
<script>
const NAT_W = {{ nat_w }}, NAT_H = {{ nat_h }};
const FACES = {{ faces_json | safe }};
const OBJECTS = {{ objects_json | safe }};


function renderBoxes() {
  const img = document.getElementById('tag-photo');
  const sx = img.clientWidth / NAT_W;
  const sy = img.clientHeight / NAT_H;
  const wrap = document.getElementById('tag-wrap');

  const all = [
    ...FACES.map(f => ({ ...f, kind: 'face' })),
    ...OBJECTS.map(o => ({ ...o, kind: 'object' })),
  ].sort((a, b) => (b.w * b.h) - (a.w * a.h));

  all.forEach(det => {
    const div = document.createElement('div');
    const isFace = det.kind === 'face';
    div.className = isFace ? 't-box' + (det.label ? ' labeled' : '') : 't-box object';
    div.style.left   = Math.max(0, det.x * sx) + 'px';
    div.style.top    = Math.max(0, det.y * sy) + 'px';
    div.style.width  = (det.w * sx) + 'px';
    div.style.height = (det.h * sy) + 'px';
    div.dataset.id    = det.id;
    div.dataset.label = det.label;

    const tip = document.createElement('div');
    tip.className = 't-tip';
    if (isFace) {
      tip.textContent = (det.label || 'Unknown')
        + (det.similarity != null ? ' (' + (det.similarity * 100).toFixed(0) + '% match)' : '');
      div.addEventListener('click', () => labelBox(div, tip));
    } else {
      tip.textContent = (det.label || 'object')
        + (det.confidence != null ? ' (' + (det.confidence * 100).toFixed(0) + '%)' : '');
      div.addEventListener('click', () => labelObjectBox(div, tip));
    }
    div.appendChild(tip);
    wrap.appendChild(div);
  });
}

function labelObjectBox(div, tip) {
  const onUnidentify = div.dataset.label ? async () => {
    const r = await fetch('/api/review/' + div.dataset.id + '/reject', { method: 'POST' });
    if (r.ok) {
      div.dataset.label = '';
      tip.textContent = 'object';
      div.classList.remove('labeled');
      setStatus('Cleared label.');
    } else {
      setStatus('Error clearing label.');
    }
  } : null;
  showLabelPopup(div, async label => {
    if (!label) return;
    const resp = await fetch('/api/detections/' + div.dataset.id + '/label', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
    if (resp.ok) {
      const d = await resp.json();
      div.dataset.label = d.label;
      tip.textContent = d.label;
      setStatus('Labeled: ' + d.label);
    } else {
      setStatus('Error saving label.');
    }
  }, div.dataset.label ? `Rename "${div.dataset.label}"` : 'Assign label', onUnidentify);
}

async function unidentifyBox(div, tip) {
  const r = await fetch('/api/review/' + div.dataset.id + '/reject', { method: 'POST' });
  if (r.ok) {
    div.dataset.label = '';
    tip.textContent = 'Unknown';
    div.classList.remove('labeled');
    setStatus('Cleared label.');
  } else {
    setStatus('Error clearing label.');
  }
}

function labelBox(div, tip) {
  const onUnidentify = div.dataset.label ? () => unidentifyBox(div, tip) : null;
  showLabelPopup(div, async label => {
    if (!label) {
      await unidentifyBox(div, tip);
      return;
    }
    const resp = await fetch('/api/detections/' + div.dataset.id + '/label', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
    if (resp.ok) {
      const d = await resp.json();
      div.dataset.label = d.label;
      tip.textContent = d.label;
      div.classList.add('labeled');
      addFaceLabel(d.label);
      setStatus('Labeled: ' + d.label);
    } else {
      setStatus('Error saving label.');
    }
  }, div.dataset.label ? `Rename "${div.dataset.label}"` : 'Assign name', onUnidentify);
}

function setStatus(msg) { document.getElementById('tag-status').textContent = msg; }

// Reprocess
document.getElementById('reprocess-btn').addEventListener('click', () => {
  document.getElementById('reprocess-error').style.display = 'none';
  document.getElementById('reprocess-overlay').style.display = 'flex';
});
document.getElementById('reprocess-overlay').addEventListener('click', function(e) {
  if (e.target === this) this.style.display = 'none';
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('reprocess-overlay').style.display = 'none';
});
document.getElementById('reprocess-save-btn').addEventListener('click', async () => {
  const type    = document.getElementById('reprocess-type').value;
  const replace = document.getElementById('reprocess-replace').checked;
  const err     = document.getElementById('reprocess-error');
  err.style.display = 'none';
  const btn = document.getElementById('reprocess-save-btn');
  btn.disabled = true;
  btn.textContent = 'Running…';
  const params = new URLSearchParams({ type, replace: replace ? 'true' : 'false' });
  const resp = await fetch('/api/images/{{ source_image_id }}/reprocess?' + params, { method: 'POST' });
  btn.disabled = false;
  btn.textContent = 'Run';
  if (resp.ok) {
    flashToast('Reprocess complete — reloading…', 'success');
    setTimeout(() => location.reload(), 800);
  } else {
    const data = await resp.json().catch(() => ({}));
    err.textContent = data.detail || 'Reprocess failed';
    err.style.display = 'block';
  }
});

// Set breadcrumb from referrer so it always reflects where the user came from
(function() {
  const ref = document.referrer;
  const link = document.getElementById('back-link');
  if (!ref || !link) return;

  const url = new URL(ref);
  const path = url.pathname;

  // Prefer history.back() so the previous gallery is restored from the browser's
  // bfcache — scroll position AND lazily-loaded rows intact — instead of a fresh
  // load that resets to the top. Falls through to the href (set below) when there
  // is no in-app history to return to (opened directly or in a new tab).
  if (url.origin === location.origin && history.length > 1) {
    link.addEventListener('click', e => { e.preventDefault(); history.back(); });
  }

  // Identity gallery → fetch the person's name
  const identityMatch = path.match(/^\/identities\/(\d+)/);
  if (identityMatch) {
    fetch('/api/identities/' + identityMatch[1])
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.label) {
          link.textContent = '← ' + data.label;
          link.href = path;
        }
      })
      .catch(() => {});
    return;
  }

  // Any other page — use its title or a sensible label
  const labels = {
    '/': 'Dashboard',
    '/detect': 'Detect',
    '/review': 'Review',
  };
  const label = labels[path] || 'Back';
  link.textContent = '← ' + label;
  link.href = path;
})();
</script>
{% endblock %}
