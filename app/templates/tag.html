{% extends "base.html" %}
{% block title %}Tag image — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:12px">
  <a id="back-link" href="/">&larr; Back</a>
  <span class="muted" style="font-size:13px;margin-left:8px">
    Click a box to assign or correct a label. Faces: orange = unlabeled, green = labeled. Objects: blue.
  </span>
  <span class="nav-spacer"></span>
  <span id="tag-status" class="muted" style="font-size:12px"></span>
</div>
<div id="tag-wrap">
  <img id="tag-photo" src="{{ image_url }}" alt="" onload="renderBoxes()">
</div>
{% endblock %}

{% block scripts %}
<script>
const NAT_W = {{ nat_w }}, NAT_H = {{ nat_h }};
const FACES = {{ faces_json | safe }};
const OBJECTS = {{ objects_json | safe }};


function renderBoxes() {
  const img = document.getElementById('tag-photo');
  const sx = img.clientWidth / NAT_W;
  const sy = img.clientHeight / NAT_H;
  const wrap = document.getElementById('tag-wrap');

  FACES.forEach(f => {
    const div = document.createElement('div');
    div.className = 't-box' + (f.label ? ' labeled' : '');
    div.style.left   = Math.max(0, f.x * sx) + 'px';
    div.style.top    = Math.max(0, f.y * sy) + 'px';
    div.style.width  = (f.w * sx) + 'px';
    div.style.height = (f.h * sy) + 'px';
    div.dataset.id    = f.id;
    div.dataset.label = f.label;

    const tip = document.createElement('div');
    tip.className = 't-tip';
    const tipText = (f.label || 'Unknown')
      + (f.similarity != null ? ' (' + (f.similarity * 100).toFixed(0) + '% match)' : '');
    tip.textContent = tipText;
    div.appendChild(tip);

    div.addEventListener('click', () => labelBox(div, tip));
    wrap.appendChild(div);
  });

  OBJECTS.forEach(o => {
    const div = document.createElement('div');
    div.className = 't-box object';
    div.style.left   = Math.max(0, o.x * sx) + 'px';
    div.style.top    = Math.max(0, o.y * sy) + 'px';
    div.style.width  = (o.w * sx) + 'px';
    div.style.height = (o.h * sy) + 'px';
    div.dataset.id    = o.id;
    div.dataset.label = o.label;

    const tip = document.createElement('div');
    tip.className = 't-tip';
    tip.textContent = (o.label || 'object')
      + (o.confidence != null ? ' (' + (o.confidence * 100).toFixed(0) + '%)' : '');
    div.appendChild(tip);

    div.addEventListener('click', () => labelObjectBox(div, tip));
    wrap.appendChild(div);
  });
}

function labelObjectBox(div, tip) {
  showLabelPopup(div, async label => {
    if (!label) return;  // objects have no review/clear flow — relabel only
    const resp = await fetch('/api/detections/' + div.dataset.id + '/label', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
    if (resp.ok) {
      const d = await resp.json();
      div.dataset.label = d.label;
      tip.textContent = d.label;
      setStatus('Labeled: ' + d.label);
    } else {
      setStatus('Error saving label.');
    }
  }, div.dataset.label ? `Rename "${div.dataset.label}"` : 'Assign label');
}

function labelBox(div, tip) {
  showLabelPopup(div, async label => {
    if (!label) {
      const r = await fetch('/api/review/' + div.dataset.id + '/reject', { method: 'POST' });
      if (r.ok) {
        div.dataset.label = '';
        tip.textContent = 'Unknown';
        div.classList.remove('labeled');
        setStatus('Cleared label.');
      } else {
        setStatus('Error clearing label.');
      }
      return;
    }
    const resp = await fetch('/api/detections/' + div.dataset.id + '/label', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label }),
    });
    if (resp.ok) {
      const d = await resp.json();
      div.dataset.label = d.label;
      tip.textContent = d.label;
      div.classList.add('labeled');
      addFaceLabel(d.label);
      setStatus('Labeled: ' + d.label);
    } else {
      setStatus('Error saving label.');
    }
  }, div.dataset.label ? `Rename "${div.dataset.label}" (blank to clear)` : 'Assign name (blank to clear)');
}

function setStatus(msg) { document.getElementById('tag-status').textContent = msg; }

// Set breadcrumb from referrer so it always reflects where the user came from
(function() {
  const ref = document.referrer;
  const link = document.getElementById('back-link');
  if (!ref || !link) return;

  const url = new URL(ref);
  const path = url.pathname;

  // Identity gallery → fetch the person's name
  const identityMatch = path.match(/^\/identities\/(\d+)/);
  if (identityMatch) {
    fetch('/api/identities/' + identityMatch[1])
      .then(r => r.ok ? r.json() : null)
      .then(data => {
        if (data && data.label) {
          link.textContent = '← ' + data.label;
          link.href = path;
        }
      })
      .catch(() => {});
    return;
  }

  // Any other page — use its title or a sensible label
  const labels = {
    '/': 'Dashboard',
    '/detect': 'Detect',
    '/review': 'Review',
  };
  const label = labels[path] || 'Back';
  link.textContent = '← ' + label;
  link.href = path;
})();
</script>
{% endblock %}
