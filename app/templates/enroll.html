{% extends "base.html" %}
{% block title %}Enroll — Argus{% endblock %}

{% block content %}
<h1 style="margin-bottom:20px">Enroll a face</h1>
<div class="card" style="max-width:480px">
  <div class="form-group">
    <label class="lbl">Name</label>
    <input type="text" id="name-input" placeholder="Full name">
  </div>
  <div class="form-group">
    <label class="lbl">Image</label>
    <button type="button" class="btn btn-ghost" id="enroll-camera"
            style="margin-bottom:8px;font-size:13px">Use camera</button>
    <div class="drop-zone" id="drop-zone">
      <p>Drop an image here or click to browse</p>
      <p class="muted" style="font-size:12px">One clear face per photo works best</p>
      <input type="file" id="file-input" accept="image/*" hidden>
    </div>
    </div>
  <div class="form-group">
    <label class="lbl">Or image URL</label>
    <input type="url" id="url-input" placeholder="http://…">
  </div>
  <div class="form-group">
    <label class="lbl">Or base64 image</label>
    <textarea id="b64-input" rows="2"
              placeholder="data:image/jpeg;base64,... or raw base64 string"
              style="font-size:12px;font-family:monospace;resize:vertical"></textarea>
  </div>
  <div id="enroll-preview-wrap" style="display:none;position:relative;width:48px;
       line-height:0;margin-bottom:12px">
    <img id="enroll-preview"
         style="width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--border)">
    <button type="button" id="enroll-preview-x" title="Remove photo"
            style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;
                   border:none;background:var(--danger);color:#fff;font-size:11px;line-height:18px;
                   text-align:center;cursor:pointer;padding:0">&times;</button>
  </div>
  <div style="display:flex;align-items:center;gap:12px;margin-top:4px">
    <button class="btn btn-primary" id="enroll-btn">Enroll</button>
  </div>
  <div id="result" style="margin-top:12px"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
(async () => {
  const dz      = document.getElementById('drop-zone');
  const fi      = document.getElementById('file-input');
  const ui      = document.getElementById('url-input');
  const b64     = document.getElementById('b64-input');
  const prevImg = document.getElementById('enroll-preview');
  const prevWrap = document.getElementById('enroll-preview-wrap');

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => (
      {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function showPreview(src) {
    if (!prevWrap) return;
    prevWrap.style.display = 'block';
    prevImg.src = src;
    prevImg.onerror = () => { prevWrap.style.display = 'none'; };
  }

  function clearPreview() {
    if (!prevWrap) return;
    prevWrap.style.display = 'none';
    prevImg.src = '';
  }

  let capturedFile = null;

  // Remove the chosen photo entirely (file/url/base64/camera) before enrolling.
  function clearInputs() {
    fi.value = ''; ui.value = '';
    if (b64) b64.value = '';
    capturedFile = null;
    clearPreview();
  }
  document.getElementById('enroll-preview-x').addEventListener('click', clearInputs);

  document.getElementById('enroll-camera').addEventListener('click', () => {
    capturePhoto(file => {
      capturedFile = file;
      fi.value = ''; ui.value = '';
      if (b64) b64.value = '';
      showPreview(URL.createObjectURL(file));
    });
  });

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('over');
    if (e.dataTransfer.files[0]) { fi.files = e.dataTransfer.files; previewFile(e.dataTransfer.files[0]); }
  });
  dz.addEventListener('click', () => fi.click());
  fi.addEventListener('change', () => { if (fi.files[0]) { capturedFile = null; previewFile(fi.files[0]); } });
  ui.addEventListener('input', () => {
    capturedFile = null;
    const v = ui.value.trim();
    v ? showPreview(v) : clearPreview();
  });
  b64?.addEventListener('input', () => {
    capturedFile = null;
    const v = b64.value.trim();
    if (!v) { clearPreview(); return; }
    showPreview(v.startsWith('data:') ? v : 'data:image/jpeg;base64,' + v);
  });

  function previewFile(file) {
    const r = new FileReader();
    r.onload = e => showPreview(e.target.result);
    r.readAsDataURL(file);
  }

  document.getElementById('enroll-btn').addEventListener('click', async () => {
    const name = document.getElementById('name-input').value.trim();
    if (!name) { msg('Name is required.', 'error'); return; }
    const fd = new FormData();
    fd.append('name', name);
    if (capturedFile)         fd.append('file',         capturedFile);
    else if (fi.files[0])     fd.append('file',         fi.files[0]);
    else if (ui.value.trim()) fd.append('image_url',    ui.value.trim());
    else if (b64?.value.trim()) fd.append('image_base64', b64.value.trim());
    else { msg('Upload a file, enter a URL, paste base64, or use the camera.', 'error'); return; }

    msg('Enrolling…', '');
    const resp = await fetch('/api/faces/enroll', { method: 'POST', body: fd });
    const data = await resp.json();
    if (resp.ok) {
      document.getElementById('name-input').value = '';
      clearInputs();
      renderEnrollResult(data, name);
    } else {
      msg(data.detail || 'Enrollment failed.', 'error');
      if (window.showToast) showToast(data.detail || 'Enrollment failed.', 'error');
    }
  });

  function msg(text, type) {
    const el = document.getElementById('result');
    el.className = type === 'error' ? 'alert alert-error' : type === 'success' ? 'alert alert-success' : 'muted';
    el.textContent = text;
  }

  // Detect-style result: the source image with a box around the enrolled face.
  function renderEnrollResult(data, name) {
    const el = document.getElementById('result');
    el.className = '';
    el.innerHTML =
      `<div class="alert alert-success" style="margin-bottom:10px">Enrolled "${esc(name)}" (identity #${data.identity_id}).</div>` +
      (data.source_image_url
        ? `<div class="img-wrap" style="position:relative;display:inline-block;max-width:100%;line-height:0">
             <img class="enroll-result-img" src="${esc(data.source_image_url)}"
                  style="max-width:100%;height:auto;border-radius:4px;display:block"></div>`
        : '');
    if (!data.source_image_url || !data.bbox) return;
    const wrap = el.querySelector('.img-wrap');
    const img  = el.querySelector('.enroll-result-img');
    const draw = () => {
      if (!img.naturalWidth) return;
      wrap.querySelectorAll('.eo-box').forEach(b => b.remove());
      const sx = img.clientWidth / img.naturalWidth, sy = img.clientHeight / img.naturalHeight;
      const b = data.bbox;
      const box = document.createElement('div');
      box.className = 'eo-box';
      box.style.cssText =
        `position:absolute;border:2px solid #3a8ef6;border-radius:2px;box-sizing:border-box;` +
        `left:${b.x * sx}px;top:${b.y * sy}px;width:${b.w * sx}px;height:${b.h * sy}px`;
      const tag = document.createElement('span');
      tag.textContent = name;
      tag.style.cssText =
        `position:absolute;left:-2px;top:-18px;background:#3a8ef6;color:#fff;font-size:10px;` +
        `line-height:14px;padding:0 4px;border-radius:2px;white-space:nowrap`;
      box.appendChild(tag);
      wrap.appendChild(box);
    };
    if (img.complete && img.naturalWidth) draw(); else img.addEventListener('load', draw);
    window.addEventListener('resize', draw);
  }
})();
</script>
{% endblock %}
