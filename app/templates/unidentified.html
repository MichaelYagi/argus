{% extends "base.html" %}
{% block title %}Unidentified — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:16px">
  <h1>Unidentified</h1>
</div>

<p class="muted" id="up-empty" hidden style="text-align:center;padding:48px 0">
  No unidentified faces. All detected faces have been assigned to a person.
</p>
<div id="up-gallery"></div>
<p class="muted loading" id="up-loading">Loading…</p>
{% endblock %}

{% block scripts %}
<script>
const gallery = ArgusGallery({
  container: document.getElementById('up-gallery'),
  emptyEl:   document.getElementById('up-empty'),
  loadingEl: document.getElementById('up-loading'),
  stateKey:  '_argus_unidentified',

  ar: item => item.ar || 1,

  buildItem(item, { saveState, removeItem }) {
    const el = document.createElement('div');
    el.className = 'g-item';
    el.dataset.id = item.detection_id;

    const img = document.createElement('img');
    img.src = item.crop_url;
    img.loading = 'lazy';
    img.alt = '';
    if (item.source_image_url) {
      img.style.cursor = 'zoom-in';
      img.addEventListener('click', e => { e.stopPropagation(); openSourceModal(item.source_image_url); });
    }
    el.appendChild(img);

    if (item.confidence != null) {
      const badge = document.createElement('div');
      badge.className = 'g-badge';
      badge.textContent = (item.confidence * 100).toFixed(0) + '%';
      badge.title = 'Detection confidence';
      el.appendChild(badge);
    }

    if (item.source_image_id) {
      const tagLink = document.createElement('a');
      tagLink.className = 'g-tag-link';
      tagLink.href = '/tag/' + item.source_image_id + '?focus=' + item.detection_id;
      tagLink.textContent = 'Tag';
      tagLink.addEventListener('click', e => {
        e.stopPropagation();
        saveState(item.detection_id);
        const ids = [...new Set(gallery.items().map(i => i.source_image_id).filter(Boolean))];
        sessionStorage.setItem('argus_nav_ids', JSON.stringify(ids));
        sessionStorage.setItem('argus_nav_back', location.href);
        sessionStorage.setItem('argus_nav_depth', '0');
      });
      el.appendChild(tagLink);
    }

    const delBtn = document.createElement('button');
    delBtn.className = 'g-del-btn';
    delBtn.title = 'Delete this detection';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      showConfirm('Delete this detection permanently?', async () => {
        let resp;
        try { resp = await fetch('/api/detections/' + item.detection_id, { method: 'DELETE' }); }
        catch (_) { if (window.showToast) showToast('Could not delete the detection (network error).', 'error'); return; }
        if (resp.ok || resp.status === 204) {
          removeItem(i => i.detection_id === item.detection_id);
          if (window.showToast) showToast('Detection deleted', 'success');
        } else if (window.showToast) {
          showToast('Could not delete the detection.', 'error');
        }
      }, { confirmText: 'Delete', danger: true });
    });
    el.appendChild(delBtn);

    const assignBtn = document.createElement('button');
    assignBtn.className = 'g-enroll-btn';
    assignBtn.style.right = '5px';
    assignBtn.title = 'Assign to a person';
    assignBtn.textContent = '+';
    assignBtn.addEventListener('click', e => {
      e.stopPropagation();
      showLabelPopup(assignBtn, async label => {
        if (!label) return;
        let resp;
        try {
          resp = await fetch('/api/detections/' + item.detection_id + '/label', {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ label }),
          });
        } catch (_) { if (window.showToast) showToast('Could not assign (network error).', 'error'); return; }
        if (resp.ok) {
          const d = await resp.json();
          removeItem(i => i.detection_id === item.detection_id);
          if (window.showToast) showToast('Assigned to ' + d.label, 'success');
        } else if (window.showToast) {
          showToast('Could not assign the detection.', 'error');
        }
      }, 'Person name…');
    });
    el.appendChild(assignBtn);

    return el;
  },

  findEl: (c, id) => c.querySelector('[data-id="' + id + '"]'),

  async fetchPage(cursor) {
    const params = new URLSearchParams({ type: 'face', limit: 40 });
    if (cursor) params.set('cursor', cursor);
    const resp = await fetch('/api/detections/unknown?' + params);
    if (!resp.ok) throw new Error('fetch failed');
    const data = await resp.json();
    const items = await Promise.all(data.items.map(item => new Promise(resolve => {
      const img = new Image();
      img.onload  = () => resolve({ ...item, ar: img.naturalWidth / (img.naturalHeight || 1) });
      img.onerror = () => resolve({ ...item, ar: 1 });
      img.src = item.crop_url;
    })));
    return { items, nextCursor: data.next_cursor, hasMore: data.has_more };
  },

  async preInit() {
    try { await fetch('/api/faces/scan', { method: 'POST' }); } catch (_) {}
  },

  filterRestored(items) {
    let labeled;
    try { labeled = new Set(JSON.parse(sessionStorage.getItem('argus_labeled') || '[]')); }
    catch (_) { labeled = new Set(); }
    sessionStorage.removeItem('argus_labeled');
    return labeled.size ? items.filter(i => !labeled.has(i.detection_id)) : items;
  },
});

// Bfcache restore: page is frozen/thawed; script doesn't re-run, so filterRestored
// above won't fire. Read sessionStorage directly and call removeItem instead.
window.addEventListener('pageshow', e => {
  if (!e.persisted) return;
  let labeled;
  try { labeled = new Set(JSON.parse(sessionStorage.getItem('argus_labeled') || '[]')); }
  catch (_) { return; }
  if (!labeled.size) return;
  sessionStorage.removeItem('argus_labeled');
  labeled.forEach(id => gallery.removeItem(i => i.detection_id === id));
});
</script>
{% endblock %}
