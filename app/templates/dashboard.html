{% extends "base.html" %}
{% block title %}Dashboard — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:16px">
  <h1>Dashboard</h1>
  <span class="nav-spacer"></span>
  <a href="/enroll" class="btn btn-primary">Enroll face</a>
  <a href="/detect" class="btn btn-ghost" style="margin-left:8px">Detect</a>
</div>

<div class="stat-grid" id="stats">
  <div class="stat"><div class="num" id="s-ident">—</div><div class="lbl">Identities</div></div>
  <div class="stat"><div class="num" id="s-faces">—</div><div class="lbl">People</div></div>
  <div class="stat"><div class="num" id="s-review">—</div><div class="lbl">Pending review</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-type="face"   onclick="switchTab('face')">
    People <span id="badge-face"
      style="display:none;background:#3a8ef6;color:#fff;border-radius:99px;
             padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px;
             vertical-align:middle;line-height:16px"></span>
  </button>
  <button class="tab-btn"        data-type="object" onclick="switchTab('object')">
    Objects <span id="badge-object"
      style="display:none;background:#3a8ef6;color:#fff;border-radius:99px;
             padding:1px 7px;font-size:10px;font-weight:700;margin-left:4px;
             vertical-align:middle;line-height:16px"></span>
  </button>
</div>

<!-- Bulk action bar (shared, shown for whichever tab has a selection) -->
<div id="bulk-bar" style="display:none;align-items:center;gap:10px;
     padding:10px 14px;margin-bottom:12px;background:var(--surface);
     border-radius:var(--radius);box-shadow:var(--shadow);border-left:3px solid var(--accent)">
  <span id="bulk-count" style="font-size:13px;font-weight:500"></span>
  <span class="nav-spacer"></span>
  <button class="btn btn-ghost" style="font-size:12px" onclick="selectAll()">Select all</button>
  <button class="btn btn-ghost" style="font-size:12px" onclick="clearSelection()">Cancel</button>
  <button class="btn" style="font-size:12px;background:#e53e3e;color:#fff;border:none"
          onclick="deleteSelected()">Delete</button>
</div>

<div id="tab-face">
  <div class="card-grid dashboard-grid" id="grid-face">
    <p class="muted loading">Loading…</p>
  </div>
</div>

<div id="tab-object" hidden>
  <div class="card-grid dashboard-grid" id="grid-object">
    <p class="muted loading">Loading…</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PAGE = 30;
const state = {
  face:   { cursor: null, hasMore: true, loading: false, loaded: false, selected: new Set() },
  object: { cursor: null, hasMore: true, loading: false, loaded: false, selected: new Set() },
};
const sentinels = {};
let activeTab = 'face';

// ---------------------------------------------------------------------------
// Bulk selection
// ---------------------------------------------------------------------------

function updateBulkBar() {
  const sel = state[activeTab].selected;
  const bar = document.getElementById('bulk-bar');
  document.getElementById('bulk-count').textContent =
    sel.size === 1 ? '1 selected' : `${sel.size} selected`;
  bar.style.display = sel.size > 0 ? 'flex' : 'none';
}

function clearSelection() {
  const s = state[activeTab];
  s.selected.clear();
  document.querySelectorAll(`#grid-${activeTab} .identity-thumb`).forEach(card => {
    card.classList.remove('selected');
    const cb = card.querySelector('.card-cb');
    if (cb) { cb.checked = false; cb.style.opacity = '0'; }
  });
  updateBulkBar();
}

function selectAll() {
  const s = state[activeTab];
  document.querySelectorAll(`#grid-${activeTab} .identity-thumb`).forEach(card => {
    const id = parseInt(card.dataset.id);
    if (!id) return;
    s.selected.add(id);
    card.classList.add('selected');
    const cb = card.querySelector('.card-cb');
    if (cb) { cb.checked = true; cb.style.opacity = '1'; }
  });
  updateBulkBar();
}

function deleteSelected() {
  const s   = state[activeTab];
  const ids = [...s.selected];
  if (!ids.length) return;
  const noun = activeTab === 'face' ? 'person' : 'object class';
  const label = ids.length === 1 ? `1 ${noun}` : `${ids.length} ${noun}${ids.length !== 1 ? 'es' : ''}`;
  showConfirm(
    `Delete ${label} and all their detections? This cannot be undone.`,
    async () => {
      await Promise.all(ids.map(id =>
        fetch(`/api/identities/${id}`, { method: 'DELETE' })
      ));
      ids.forEach(id => {
        const card = document.querySelector(`#grid-${activeTab} [data-id="${id}"]`);
        if (card) card.remove();
      });
      s.selected.clear();
      updateBulkBar();
      // Update badge
      const badge = document.getElementById('badge-' + activeTab);
      if (badge) {
        const cur = parseInt(badge.textContent) || 0;
        const next = Math.max(0, cur - ids.length);
        badge.textContent = next > 99 ? '99+' : next;
        badge.style.display = next > 0 ? 'inline' : 'none';
      }
      refreshStats();
    },
    { confirmText: 'Delete', danger: true }
  );
}

function makeCard(d, type) {
  const img = d.thumbnail_url
    ? `<img src="${d.thumbnail_url}" alt="${d.label}">`
    : `<div class="it-ph">?</div>`;
  const a = document.createElement('a');
  a.href = '/identities/' + d.id;
  a.className = 'identity-thumb';
  a.dataset.id = d.id;
  a.style.position = 'relative';
  a.innerHTML = img +
    `<div class="it-name">${d.label}</div>` +
    `<div class="it-count">${d.detection_count} detection${d.detection_count !== 1 ? 's' : ''}</div>`;

  // Checkbox overlay
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'card-cb';
  cb.style.cssText = 'position:absolute;top:6px;left:6px;z-index:3;opacity:0;' +
    'width:16px;height:16px;cursor:pointer;accent-color:#3a8ef6';
  a.prepend(cb);

  // Show checkbox on hover
  a.addEventListener('mouseenter', () => { cb.style.opacity = '1'; });
  a.addEventListener('mouseleave', () => {
    if (!cb.checked && !state[type].selected.size) cb.style.opacity = '0';
  });

  cb.addEventListener('click', e => e.stopPropagation());

  cb.addEventListener('change', e => {
    e.stopPropagation();
    const s = state[type];
    if (cb.checked) {
      s.selected.add(d.id);
      a.classList.add('selected');
      cb.style.opacity = '1';
    } else {
      s.selected.delete(d.id);
      a.classList.remove('selected');
      if (!s.selected.size) cb.style.opacity = '0';
    }
    // Show all checkboxes when any selected
    document.querySelectorAll(`#grid-${type} .card-cb`).forEach(c => {
      if (!c.checked) c.style.opacity = s.selected.size ? '1' : '0';
    });
    updateBulkBar();
  });

  // Intercept navigation when in select mode
  a.addEventListener('click', e => {
    if (state[type].selected.size || cb.checked) {
      e.preventDefault();
      cb.checked = !cb.checked;
      cb.dispatchEvent(new Event('change'));
    }
  });

  return a;
}

function switchTab(type) {
  clearSelection();
  activeTab = type;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.type === type)
  );
  ['face', 'object'].forEach(t => {
    document.getElementById('tab-' + t).hidden = (t !== type);
  });
  localStorage.setItem('dashboard_tab', type);
  if (!state[type].loaded) loadMore(type);
}

async function loadMore(type) {
  const s = state[type];
  if (s.loading || !s.hasMore) return;
  s.loading = true;

  const params = new URLSearchParams({ type, limit: PAGE });
  if (s.cursor) params.set('cursor', s.cursor);

  const resp = await fetch('/api/identities/summary?' + params);
  if (!resp.ok) { s.loading = false; return; }
  const data = await resp.json();

  s.hasMore   = data.has_more;
  s.cursor    = data.next_cursor;
  s.loaded    = true;
  s.loading   = false;

  if (data.total != null) {
    const badge = document.getElementById('badge-' + type);
    if (badge) {
      badge.textContent = data.total > 99 ? '99+' : data.total;
      badge.style.display = data.total > 0 ? 'inline' : 'none';
    }
  }

  const grid = document.getElementById('grid-' + type);
  if (grid.querySelector('.loading')) grid.innerHTML = '';

  if (!data.items.length && !grid.children.length) {
    grid.innerHTML = type === 'face'
      ? '<p class="muted" style="grid-column:1/-1">No people enrolled yet. <a href="/enroll">Enroll a face</a> to get started.</p>'
      : '<p class="muted" style="grid-column:1/-1">No objects detected yet. Run detection on some photos first.</p>';
    return;
  }

  data.items.forEach(d => grid.appendChild(makeCard(d, type)));

  if (!s.hasMore && sentinels[type]) {
    sentinels[type].remove();
    delete sentinels[type];
  }
}

// Set up infinite scroll sentinels for both tabs
['face', 'object'].forEach(type => {
  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  document.getElementById('tab-' + type).appendChild(sentinel);
  sentinels[type] = sentinel;
  new IntersectionObserver(([e]) => {
    if (e.isIntersecting) loadMore(type);
  }, { rootMargin: '300px' }).observe(sentinel);
});

// Stats — refreshed on load, every 30s, and after bulk actions
async function refreshStats() {
  const [faceResp, objResp, rvResp] = await Promise.all([
    fetch('/api/identities/summary?type=face&limit=1'),
    fetch('/api/identities/summary?type=object&limit=1'),
    fetch('/api/review/count'),
  ]);
  if (!faceResp.ok || !objResp.ok || !rvResp.ok) return;
  const [fd, od, rv] = await Promise.all([faceResp.json(), objResp.json(), rvResp.json()]);
  const faceTotal = fd.total ?? 0;
  const objTotal  = od.total ?? 0;
  document.getElementById('s-ident').textContent  = faceTotal + objTotal;
  document.getElementById('s-faces').textContent  = faceTotal;
  document.getElementById('s-review').textContent = rv.count ?? 0;
}
refreshStats();
setInterval(refreshStats, 30000);

// Restore last active tab (defaults to People)
switchTab(localStorage.getItem('dashboard_tab') || 'face');
</script>
{% endblock %}
