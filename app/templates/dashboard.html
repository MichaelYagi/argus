{% extends "base.html" %}
{% block title %}Dashboard — Argus{% endblock %}

{% block content %}
<div class="page-header" style="margin-bottom:16px">
  <h1>Dashboard</h1>
  <span class="nav-spacer"></span>
  <a href="/enroll" class="btn btn-primary">Enroll face</a>
  <a href="/detect" class="btn btn-ghost" style="margin-left:8px">Detect</a>
</div>

<div class="stat-grid" id="stats">
  <div class="stat"><div class="num" id="s-ident">—</div><div class="lbl">Identities</div></div>
  <div class="stat"><div class="num" id="s-faces">—</div><div class="lbl">People</div></div>
  <div class="stat"><div class="num" id="s-review">—</div><div class="lbl">Pending review</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" data-type="face"   onclick="switchTab('face')">People</button>
  <button class="tab-btn"        data-type="object" onclick="switchTab('object')">Objects</button>
</div>

<div id="tab-face">
  <div class="card-grid dashboard-grid" id="grid-face">
    <p class="muted loading">Loading…</p>
  </div>
</div>

<div id="tab-object" hidden>
  <div class="card-grid dashboard-grid" id="grid-object">
    <p class="muted loading">Loading…</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const PAGE = 30;
const state = {
  face:   { cursor: null, hasMore: true, loading: false, loaded: false },
  object: { cursor: null, hasMore: true, loading: false, loaded: false },
};
const sentinels = {};

function switchTab(type) {
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.type === type)
  );
  ['face', 'object'].forEach(t => {
    document.getElementById('tab-' + t).hidden = (t !== type);
  });
  localStorage.setItem('dashboard_tab', type);
  if (!state[type].loaded) loadMore(type);
}

async function loadMore(type) {
  const s = state[type];
  if (s.loading || !s.hasMore) return;
  s.loading = true;

  const params = new URLSearchParams({ type, limit: PAGE });
  if (s.cursor) params.set('cursor', s.cursor);

  const resp = await fetch('/api/identities/summary?' + params);
  if (!resp.ok) { s.loading = false; return; }
  const data = await resp.json();

  s.hasMore   = data.has_more;
  s.cursor    = data.next_cursor;
  s.loaded    = true;
  s.loading   = false;

  const grid = document.getElementById('grid-' + type);
  if (grid.querySelector('.loading')) grid.innerHTML = '';

  if (!data.items.length && !grid.children.length) {
    grid.innerHTML = type === 'face'
      ? '<p class="muted" style="grid-column:1/-1">No people enrolled yet. <a href="/enroll">Enroll a face</a> to get started.</p>'
      : '<p class="muted" style="grid-column:1/-1">No objects detected yet. Run detection on some photos first.</p>';
    return;
  }

  data.items.forEach(d => {
    const img = d.thumbnail_url
      ? `<img src="${d.thumbnail_url}" alt="${d.label}">`
      : `<div class="it-ph">?</div>`;
    const a = document.createElement('a');
    a.href = '/identities/' + d.id;
    a.className = 'identity-thumb';
    a.innerHTML = img +
      `<div class="it-name">${d.label}</div>` +
      `<div class="it-count">${d.detection_count} detection${d.detection_count !== 1 ? 's' : ''}</div>`;
    grid.appendChild(a);
  });

  if (!s.hasMore && sentinels[type]) {
    sentinels[type].remove();
    delete sentinels[type];
  }
}

// Set up infinite scroll sentinels for both tabs
['face', 'object'].forEach(type => {
  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  document.getElementById('tab-' + type).appendChild(sentinel);
  sentinels[type] = sentinel;
  new IntersectionObserver(([e]) => {
    if (e.isIntersecting) loadMore(type);
  }, { rootMargin: '300px' }).observe(sentinel);
});

// Stats (lightweight — no joins)
(async () => {
  const [idResp, rvResp] = await Promise.all([
    fetch('/api/identities'),
    fetch('/api/review/count'),
  ]);
  const identities = await idResp.json();
  const rv = await rvResp.json();
  document.getElementById('s-ident').textContent  = identities.length;
  document.getElementById('s-faces').textContent  = identities.filter(i => i.type === 'face').length;
  document.getElementById('s-review').textContent = rv.count ?? 0;
})();

// Restore last active tab (defaults to People)
switchTab(localStorage.getItem('dashboard_tab') || 'face');
</script>
{% endblock %}
