<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Argus{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/css/style.css">
  {% block head %}{% endblock %}
</head>
<body>
<script src="/static/js/autocomplete.js"></script>
<script>
fetch('/api/review/count')
  .then(r => r.ok ? r.json() : null)
  .then(data => {
    if (!data || !data.count) return;
    const badge = document.getElementById('review-count-badge');
    if (badge) {
      badge.textContent = data.count > 99 ? '99+' : data.count;
      badge.style.display = 'inline';
    }
  })
  .catch(() => {});
</script>
<nav>
  <a href="/" style="display:flex;align-items:center;gap:7px;text-decoration:none;margin-right:4px">
    <img src="/static/favicon.svg" width="24" height="24" alt="Argus">
    <span class="brand">Argus</span>
  </a>

  <!-- Desktop links -->
  <a href="/"         class="nav-desktop {% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
  <a href="/enroll"   class="nav-desktop {% if active == 'enroll'    %}active{% endif %}">Enroll</a>
  <a href="/detect"   class="nav-desktop {% if active == 'detect'    %}active{% endif %}">Detect</a>
  <a href="/review"   class="nav-desktop {% if active == 'review'    %}active{% endif %}">
    Review <span id="review-count-badge"
      style="display:none;background:#e53e3e;color:#fff;border-radius:99px;
             padding:1px 6px;font-size:10px;font-weight:700;margin-left:3px;
             vertical-align:middle;line-height:16px"></span>
  </a>
  <a href="/models"   class="nav-desktop {% if active == 'models'    %}active{% endif %}">Models</a>
  <a href="/settings" class="nav-desktop {% if active == 'settings'  %}active{% endif %}">Settings</a>
  <a href="/docs"     class="nav-desktop {% if active == 'docs'      %}active{% endif %}">API docs</a>
  <span class="nav-spacer nav-desktop"></span>
  <a href="/account"  class="nav-desktop" style="color:#aaa;font-size:12px">{{ username }}</a>
  <form method="post" action="/logout" class="nav-desktop">
    <button type="submit">Sign out</button>
  </form>

  <!-- Mobile hamburger -->
  <span class="nav-spacer nav-mobile"></span>
  <button class="nav-burger" id="nav-burger" aria-label="Menu" onclick="
    var m = document.getElementById('mobile-menu');
    m.hidden = !m.hidden;
    this.textContent = m.hidden ? '☰' : '✕';
  ">☰</button>
</nav>

<!-- Mobile dropdown -->
<div id="mobile-menu" class="mobile-menu" hidden>
  <a href="/"         class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
  <a href="/enroll"   class="{% if active == 'enroll'    %}active{% endif %}">Enroll</a>
  <a href="/detect"   class="{% if active == 'detect'    %}active{% endif %}">Detect</a>
  <a href="/review"   class="{% if active == 'review'    %}active{% endif %}">Review</a>
  <a href="/models"   class="{% if active == 'models'    %}active{% endif %}">Models</a>
  <a href="/settings" class="{% if active == 'settings'  %}active{% endif %}">Settings</a>
  <a href="/docs"     class="{% if active == 'docs'      %}active{% endif %}">API docs</a>
  {% if username %}
  <a href="/account">{{ username }}</a>
  <form method="post" action="/logout">
    <button type="submit">Sign out</button>
  </form>
  {% endif %}
</div>

<main>
  <div class="main-content">
    {% block content %}{% endblock %}
  </div>
</main>
{% block scripts %}{% endblock %}
</body>
</html>
